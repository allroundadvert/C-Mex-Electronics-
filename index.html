<script>
function submitOrder() {
  const name = document.querySelector('input[type="text"]').value.trim();
  const phone = document.querySelector('input[type="tel"]').value.trim();

  const selected = Array.from(document.querySelectorAll('.products input:checked'))
    .map(item => item.value);

  if (!name || !phone || selected.length === 0) {
    alert("Please fill your name, phone and select at least one product.");
    return;
  }

  let message = `Hello C Mex Electronics,%0A
My Name: ${name}%0A
Phone: ${phone}%0A
I want to order:%0A- ${selected.join('%0A- ')}%0A
Please provide price and availability.`;

  window.open(`https://wa.me/2348060937893?text=${message}`, '_blank');
}
